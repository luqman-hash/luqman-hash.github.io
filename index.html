<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luqmanul Wafa</title>
    <style>
        /* Gaya dasar untuk merapikan halaman */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Gaya untuk Navbar */
        .navbar {
            background-color: #333;
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        /* Gaya untuk Logo/Nama di Navbar */
        .navbar .logo {
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        /* Gaya untuk Wadah Menu Navigasi */
        .navbar ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        /* Gaya untuk setiap Item Menu */
        .navbar li a {
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
        }

        /* Efek saat menu diarahkan oleh mouse (Hover) */
        .navbar li a:hover {
            background-color: #575757;
        }

        /* Gaya untuk Konten Utama */
        .content {
            padding: 20px;
        }
    </style>
</head>

<body>

    <!-- Bagian Navbar Baru -->
    <nav class="navbar">
        <div class="logo">Luqmanul Wafa</div>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#tentang">Tentang</a></li>
            <li><a href="#kontak">Kontak</a></li>
        </ul>
    </nav>

    <!-- Konten Utama Anda -->
    <div class="content">
        <h1>Halo Dunia! Ini website pribadi Luqmanul Wafa.</h1>
    </div>

</body>

</html>
